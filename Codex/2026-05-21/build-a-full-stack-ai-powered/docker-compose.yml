services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: surakshanet
      POSTGRES_USER: surakshanet
      POSTGRES_PASSWORD: surakshanet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres_data:
